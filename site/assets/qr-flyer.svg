<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#ffffff"/>
  <!-- QR pattern (simplified) -->
  <rect x="50" y="50" width="300" height="300" fill="#1a365d" rx="8"/>
  <!-- QR cells -->
  <g fill="#ffffff">
    <rect x="65" y="65" width="50" height="50"/><rect x="165" y="65" width="20" height="20"/>
    <rect x="200" y="65" width="20" height="20"/><rect x="285" y="65" width="50" height="50"/>
    <rect x="65" y="130" width="50" height="20"/><rect x="285" y="130" width="50" height="20"/>
    <rect x="65" y="165" width="20" height="20"/><rect x="100" y="165" width="20" height="20"/>
    <rect x="200" y="165" width="20" height="20"/><rect x="235" y="165" width="50" height="20"/>
    <rect x="65" y="200" width="20" height="50"/><rect x="165" y="200" width="20" height="20"/>
    <rect x="285" y="165" width="50" height="20"/><rect x="285" y="200" width="50" height="20"/>
    <rect x="65" y="285" width="50" height="50"/><rect x="285" y="285" width="50" height="50"/>
    <rect x="130" y="285" width="20" height="50"/><rect x="200" y="285" width="20" height="50"/>
  </g>
  <text x="200" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#1a365d">Scan for Malaysia jobs info</text>
</svg>
